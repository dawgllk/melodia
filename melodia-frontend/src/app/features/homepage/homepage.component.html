<header class="app-header">
  <nav class="app-header__nav">
    <div class="app-header__brand">
      <img class="app-header__logo" src="icon.png" alt="Melodia logo">
      <h1 class="app-header__title">Melodia</h1>
    </div>

    <div class="app-header__actions">
      <button class="app-header__button" (click)="onClickLogin()">Sign In</button>
      <button class="app-header__button" (click)="onClickRegister()">Create Account</button>
      <button class="app-header__button" (click)="onClickLikedSongs()">Liked Songs</button>
      <button class="app-header__button" (click)="onClickSearch()">Search</button>
    </div>
  </nav>
</header>

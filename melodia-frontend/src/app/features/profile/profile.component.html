<section class="profile-page">
  <div class="profile-card">
    <div class="profile-header">
      <div class="avatar">
        {{ avatarLetter }}
      </div>

      <div>
        <h1>{{ user?.username || 'Profile' }}</h1>
        <p>{{ user?.email || 'Connect your Spotify account' }}</p>
      </div>
    </div>

    <div class="spotify-section">
      <div>
        <h2>Spotify</h2>
        <p *ngIf="spotifyStatusLoading">Checking Spotify connection...</p>
        <p *ngIf="!spotifyStatusLoading && !spotifyConnected">
          Connect your Spotify account to use personalized music features.
        </p>
        <p *ngIf="!spotifyStatusLoading && spotifyConnected" class="spotify-status connected">
          Spotify connected
        </p>
        <p *ngIf="spotifyError" class="spotify-error">{{ spotifyError }}</p>
      </div>

      <button
        *ngIf="!spotifyStatusLoading && !spotifyConnected"
        class="spotify-btn"
        (click)="connectSpotify()"
      >
        Connect Spotify
      </button>

      <button
        *ngIf="!spotifyStatusLoading && spotifyConnected"
        class="spotify-btn disconnect"
        (click)="disconnectSpotify()"
        [disabled]="spotifyDisconnecting"
      >
        {{ spotifyDisconnecting ? 'Disconnecting...' : 'Disconnect Spotify' }}
      </button>
    </div>

    <button class="logout-btn" (click)="logout()">
      Logout
    </button>
  </div>
</section>
